services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: kiro-gateway:latest
    restart: on-failure:5
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    env_file:
      - .env
    environment:
      # These override any matching keys from .env — do not change them.
      SERVER_HOST: "0.0.0.0"     # Must be 0.0.0.0 inside Docker
      TLS_ENABLED: "true"        # Required for non-loopback binding (see src/config.rs:294-310)
      KIRO_CLI_DB_FILE: /kiro-data.db
      CONFIG_DB: /data/config.db
      TLS_CERT: /certs/cert.pem
      TLS_KEY: /certs/key.pem
    volumes:
      # Auth DB — synced from your local machine (read-only; gateway only reads tokens)
      - ./kiro-data.db:/kiro-data.db:ro
      # Config DB — persisted across container restarts via named volume
      - config-db:/data
      # TLS certificates — bind mount so you control cert lifecycle
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:${SERVER_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  config-db:
